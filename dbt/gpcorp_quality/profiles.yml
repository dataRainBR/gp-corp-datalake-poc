# Profile dbt-athena para o projeto de qualidade
# Copiar para ~/.dbt/profiles.yml ou referenciar via DBT_PROFILES_DIR

gpcorp_quality:
  target: dev
  outputs:
    dev:
      type: athena
      s3_staging_dir: s3://gpcorp-datalake/athena-results/
      s3_data_dir: s3://gpcorp-datalake/dbt-data/
      region_name: us-east-1
      database: awsdatacatalog
      schema: gpcorp_silver
      work_group: primary
      threads: 4
      num_retries: 3
